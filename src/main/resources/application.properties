spring.jmx.enabled=false
#logging.level.root=debug
logging.level.bootiful.asciidoctor=DEBUG

spring.main.web-application-type=none

pipeline.job.root=${HOME}/Desktop/root
pipeline.job.target=${HOME}/Desktop/target

publication.mobi.enabled=false

publication.html.enabled=true

publication.epub.enabled=false

publication.pdf.prepress.enabled=true
publication.pdf.prepress.optimize=false

publication.pdf.screen.enabled=true
publication.pdf.screen.optimize=false

pipeline.job.book-name=Bootiful Spring AI
pipeline.job.document-repository=https://github.com/agentic-spring-ai-book/book.git
pipeline.job.code-repositories=\
  https://github.com/agentic-spring-ai-book/bootcamp.git,\
  https://github.com/agentic-spring-ai-book/mcp.git,\
  https://github.com/agentic-spring-ai-book/agentic-orchestration.git,\
  https://github.com/agentic-spring-ai-book/clis.git,\
  https://github.com/agentic-spring-ai-book/skills.git,\
  https://github.com/agentic-spring-ai-book/prompts.git

## Enable the Git Branch Document Publisher
pipeline.job.publishers.git.enabled=true
pipeline.job.publishers.git.artifact-branch=artifacts
pipeline.job.publishers.git.repository=https://github.com/agentic-spring-ai-book/book.git

## Enable the S3 Publisher
pipeline.job.publishers.s3.enabled=true
pipeline.job.publishers.s3.access-key-id=${AWS_ACCESS_KEY_ID}
pipeline.job.publishers.s3.region=${AWS_REGION}
pipeline.job.publishers.s3.secret-access-key=${AWS_SECRET_ACCESS_KEY}
pipeline.job.publishers.s3.bucket-name=agentic-spring-ai-book
#pipeline.job.publishers.s3.bucket-name=agentic-spring-ai-book-james
