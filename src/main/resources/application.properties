spring.jmx.enabled=false
#logging.level.root=debug
logging.level.bootiful.asciidoctor=DEBUG
spring.main.web-application-type=none
pipeline.job.root=${HOME}/Desktop/root
pipeline.job.target=${HOME}/Desktop/target
publication.html.enabled=true
publication.mobi.enabled=false
publication.epub.enabled=false
publication.pdf.prepress.enabled=true
publication.pdf.prepress.optimize=false
publication.pdf.screen.enabled=false
publication.pdf.screen.optimize=false
pipeline.job.book-name=Secure All The Things (with Spring Security and OAuth)!
pipeline.job.document-repository=https://github.com/secure-all-the-things-book/book.git
pipeline.job.code-repositories=\
  https://github.com/secure-all-the-things-book/mcp.git,\
  https://github.com/secure-all-the-things-book/authorization-server.git,\
  https://github.com/secure-all-the-things-book/messaging.git,\
  https://github.com/secure-all-the-things-book/java.git,\
  https://github.com/secure-all-the-things-book/soap.git,\
  https://github.com/secure-all-the-things-book/shell.git,\
  https://github.com/secure-all-the-things-book/grpc.git,\
  https://github.com/secure-all-the-things-book/gateway.git,\
  https://github.com/secure-all-the-things-book/web.git
## Enable the Git Branch Document Publisher
pipeline.job.publishers.git.enabled=true
pipeline.job.publishers.git.artifact-branch=artifacts
pipeline.job.publishers.git.repository=https://github.com/secure-all-the-things-book/book.git
## Enable the S3 Publisher
pipeline.job.publishers.s3.enabled=true
pipeline.job.publishers.s3.access-key-id=${AWS_ACCESS_KEY_ID}
pipeline.job.publishers.s3.region=${AWS_REGION}
pipeline.job.publishers.s3.secret-access-key=${AWS_SECRET_ACCESS_KEY}
pipeline.job.publishers.s3.bucket-name=secure-all-the-things-book

